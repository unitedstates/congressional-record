steps:
  - name: build
    image: python:3.11-bullseye
    when:
      - event: push
        branch: main
    dns: 192.168.10.1
    dns_search: "homelab.nicelycomputed.com"
    extra_hosts:
      - "forge.homelab.nicelycomputed.com:192.168.10.196"
    commands:
      - python -m pip install --upgrade pip build
      - python -m build
