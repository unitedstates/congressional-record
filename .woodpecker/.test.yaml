steps:
  - name: build
    image: python:3.11-bullseye
    when:
      - event: push
        branch: main
    commands:
      - echo "192.168.10.196 forge.homelab.nicelycomputed.com" >> /etc/hosts
      - python -m pip install --upgrade pip build
      - python -m build
  - name: install
    image: python:3.11-bullseye
    when:
      - event: push
        branch: main
    commands:
      - echo "192.168.10.196 forge.homelab.nicelycomputed.com" >> /etc/hosts
      - python -m pip install -e .
  - name: test
    image: python:3.11-bullseye
    when:
      - event: push
        branch: main
    commands:
      - echo "192.168.10.196 forge.homelab.nicelycomputed.com" >> /etc/hosts
      - python -m run_tests
